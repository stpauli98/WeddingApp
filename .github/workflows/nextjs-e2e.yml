name: Next.js E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: weddingapp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/weddingapp_ci
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/weddingapp_ci
      CSRF_SECRET: ${{ secrets.CI_CSRF_SECRET }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      E2E_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate (with engine for CI)
        run: npx prisma generate

      - name: Push schema to ephemeral CI DB
        # Migration history references a PricingTier enum that isn't created
        # by any migration (added via db push in an earlier environment).
        # db push syncs the Prisma schema directly, bypassing the broken
        # migration chain. Safe for ephemeral CI Postgres.
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Seed pricing plans
        run: npx tsx prisma/seed.ts

      - name: Build Next.js
        run: npx next build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Next.js server
        run: pnpm start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 -t 60000

      - name: Run Playwright
        run: pnpm exec playwright test

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
